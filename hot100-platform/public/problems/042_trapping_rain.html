    <script>
      const SNIPPETS = {
        ts: `// TypeScript
function trap(height: number[]): number {
    let left = 0;
    let right = height.length - 1;
    let leftMax = 0, rightMax = 0;
    let ans = 0;

    // 左右指针向中间靠拢
    while (left < right) {
        // 哪边柱子矮，就处理哪边，因为木桶效应，短板决定装水量
        if (height[left] < height[right]) {
            // 如果当前柱子高于已知左侧最高，更新最高值，无法装水
            if (height[left] >= leftMax) {
                leftMax = height[left];
            } else {
                // 否则，当前列能装的水 = 左侧最高值 - 当前柱子高度
                ans += leftMax - height[left];
            }
            left++; // 左指针向右移动
        } else {
            // 同理处理右侧较矮的情况
            if (height[right] >= rightMax) {
                rightMax = height[right];
            } else {
                ans += rightMax - height[right];
            }
            right--; // 右指针向左移动
        }
    }
    return ans;
}`,
        python: `# Python
class Solution:
    def trap(self, height: List[int]) -> int:
        left, right = 0, len(height) - 1
        left_max, right_max = 0, 0
        ans = 0
        
        # 左右指针向中间靠拢
        while left < right:
            # 哪边柱子矮，就处理哪边
            if height[left] < height[right]:
                # 当前柱子高于已知左侧最高，更新最高值，无法装水
                if height[left] >= left_max:
                    left_max = height[left]
                else:
                    # 当前列能装的水 = 左侧最高值 - 当前高度
                    ans += left_max - height[left]
                left += 1
            else:
                # 同理处理右侧较矮的情况
                if height[right] >= right_max:
                    right_max = height[right]
                else:
                    ans += right_max - height[right]
                right -= 1
        return ans`,
        java: `// Java
class Solution {
    public int trap(int[] height) {
        int left = 0, right = height.length - 1;
        int leftMax = 0, rightMax = 0;
        int ans = 0;
        
        // 左右指针向中间靠拢
        while (left < right) {
            // 哪边柱子矮，就处理哪边
            if (height[left] < height[right]) {
                if (height[left] >= leftMax) {
                    leftMax = height[left];
                } else {
                    ans += leftMax - height[left];
                }
                left++;
            } else {
                if (height[right] >= rightMax) {
                    rightMax = height[right];
                } else {
                    ans += rightMax - height[right];
                }
                right--;
            }
        }
        return ans;
    }
}`,
        cpp: `// C++
class Solution {
public:
    int trap(vector<int>& height) {
        int left = 0, right = height.size() - 1;
        int leftMax = 0, rightMax = 0;
        int ans = 0;
        
        while (left < right) {
            // 哪边柱子矮，就处理哪边
            if (height[left] < height[right]) {
                if (height[left] >= leftMax) {
                    leftMax = height[left];
                } else {
                    ans += leftMax - height[left];
                }
                left++;
            } else {
                if (height[right] >= rightMax) {
                    rightMax = height[right];
                } else {
                    ans += rightMax - height[right];
                }
                right--;
            }
        }
        return ans;
    }
};`,
        c: `// C
int trap(int* height, int heightSize) {
    int left = 0, right = heightSize - 1;
    int leftMax = 0, rightMax = 0;
    int ans = 0;
    
    while (left < right) {
        // 哪边柱子矮，就处理哪边
        if (height[left] < height[right]) {
            if (height[left] >= leftMax) {
                leftMax = height[left];
            } else {
                ans += leftMax - height[left];
            }
            left++;
        } else {
            if (height[right] >= rightMax) {
                rightMax = height[right];
            } else {
                ans += rightMax - height[right];
            }
            right--;
        }
    }
    return ans;
}`,
      };

      const LANG_VARS = {
        ts: { l: "left", r: "right", lm: "leftMax", rm: "rightMax" },
        python: { l: "left", r: "right", lm: "left_max", rm: "right_max" },
        java: { l: "left", r: "right", lm: "leftMax", rm: "rightMax" },
        cpp: { l: "left", r: "right", lm: "leftMax", rm: "rightMax" },
        c: { l: "left", r: "right", lm: "leftMax", rm: "rightMax" },
      };

      let params = { seed: 888, speed: 1.0, n: 16 };
      let isDone = false,
        isPaused = false,
        p5Timer = 0;
      let currentLang = "ts";

      // Logic variables
      let heightArr = [];
      let waterArr = [];
      let leftIdx = 0,
        rightIdx = 0;
      let leftMaxVal = 0,
        rightMaxVal = 0;
      let ansTotal = 0;

      // Phase control: 'COMPARE' -> 'PROCESS' -> 'MOVE'
      let currentPhase = "COMPARE";
      let activeSide = "none";

      // Animation state
      let dispLeftX = 0,
        dispRightX = 0;
      let dispLeftMaxH = 0,
        dispRightMaxH = 0;

      function setup() {
        let container = document.getElementById("canvas-container");
        let canvas = createCanvas(
          container.offsetWidth || 500,
          container.offsetHeight || 600,
        );
        canvas.parent("canvas-container");
        window.addEventListener("resize", () =>
          resizeCanvas(container.offsetWidth, container.offsetHeight),
        );
        switchLang("ts");
      }

      function initializeSystem() {
        randomSeed(params.seed);

        // Generate nice terrain
        heightArr = [];
        waterArr = [];
        for (let i = 0; i < params.n; i++) {
          // Avoid too flat terrain by applying some sin wave + random
          let val = floor(abs(sin(i * 0.5) * 4 + random(0, 5)));
          if (i === 0 || i === params.n - 1) val = floor(random(0, 3)); // edges lower
          heightArr.push(val);
          waterArr.push(0);
        }

        // Logic Init
        leftIdx = 0;
        rightIdx = params.n - 1;
        leftMaxVal = 0;
        rightMaxVal = 0;
        ansTotal = 0;
        currentPhase = "COMPARE";
        activeSide = "none";

        isDone = false;
        isPaused = false;
        p5Timer = 0;

        let btn = document.getElementById("pause-btn");
        if (btn) {
          btn.innerHTML = "⏸ 暂停";
          btn.style.background = "var(--anthropic-dark)";
        }

        document.getElementById("log-container").innerHTML = "";
        document.getElementById("ans-display").innerText = "0";
        logMsg("✅ 演示就绪。左右指针初始化于两端。", true);

        // Initial render coords
        dispLeftX = leftIdx;
        dispRightX = rightIdx;
        dispLeftMaxH = 0;
        dispRightMaxH = 0;

        updateDataUI();
      }

      function draw() {
        background(253, 252, 249);

        let w = width / (params.n + 2);
        let maxH = 10; // Expected max height
        let hUnit = (height - 150) / maxH;
        let baseY = height - 50;
        let startX = w;

        // Draw grid lines
        stroke(230);
        strokeWeight(1);
        for (let i = 1; i <= 8; i++) {
          line(
            startX - 20,
            baseY - i * hUnit,
            startX + params.n * w + 20,
            baseY - i * hUnit,
          );
        }

        // Draw bars & water
        for (let i = 0; i < params.n; i++) {
          let x = startX + i * w;
          let h = heightArr[i] * hUnit;
          let waterH = waterArr[i] * hUnit;

          // Ground/Bar
          noStroke();
          fill(heightArr[i] === 0 ? 245 : 80);
          rect(x, baseY - h, w - 4, h, 2, 2, 0, 0);

          // Height label
          fill(150);
          textSize(10);
          textAlign(CENTER, BOTTOM);
          text(heightArr[i], x + w / 2 - 2, baseY + 15);

          // Water
          if (waterH > 0) {
            fill("rgba(106, 155, 204, 0.7)"); // anthropic-blue with alpha
            rect(x, baseY - h - waterH, w - 4, waterH, 2, 2, 0, 0);
            // Add water + symbol
            fill("#005b9f");
            textSize(11);
            text(`+${waterArr[i]}`, x + w / 2 - 2, baseY - h - waterH / 2 + 5);
          }
        }

        // Lerp pointers and max values
        dispLeftX = lerp(dispLeftX, leftIdx, 0.15 * params.speed);
        dispRightX = lerp(dispRightX, rightIdx, 0.15 * params.speed);
        dispLeftMaxH = lerp(dispLeftMaxH, leftMaxVal, 0.15 * params.speed);
        dispRightMaxH = lerp(dispRightMaxH, rightMaxVal, 0.15 * params.speed);

        let lPx = startX + dispLeftX * w;
        let rPx = startX + dispRightX * w;

        // Draw Max Level Lines
        if (dispLeftMaxH > 0.1) {
          stroke("#d97757");
          strokeWeight(2);
          drawingContext.setLineDash([5, 5]);
          line(
            startX,
            baseY - dispLeftMaxH * hUnit,
            lPx + w / 2,
            baseY - dispLeftMaxH * hUnit,
          );
          drawingContext.setLineDash([]);
          noStroke();
          fill("#d97757");
          textAlign(RIGHT, CENTER);
          textSize(11);
          text(
            `${LANG_VARS[currentLang].lm}: ${leftMaxVal}`,
            startX - 10,
            baseY - dispLeftMaxH * hUnit,
          );
        }

        if (dispRightMaxH > 0.1) {
          stroke("#6a9bcc");
          strokeWeight(2);
          drawingContext.setLineDash([5, 5]);
          line(
            rPx + w / 2,
            baseY - dispRightMaxH * hUnit,
            startX + params.n * w,
            baseY - dispRightMaxH * hUnit,
          );
          drawingContext.setLineDash([]);
          noStroke();
          fill("#6a9bcc");
          textAlign(LEFT, CENTER);
          textSize(11);
          text(
            `${LANG_VARS[currentLang].rm}: ${rightMaxVal}`,
            startX + params.n * w + 10,
            baseY - dispRightMaxH * hUnit,
          );
        }

        // Draw Left Pointer
        if (leftIdx <= rightIdx) {
          fill("#d97757");
          noStroke();
          rect(lPx + w / 2 - 15, baseY + 20, 30, 18, 4);
          fill(255);
          textSize(10);
          textAlign(CENTER, CENTER);
          text(`${LANG_VARS[currentLang].l}↑`, lPx + w / 2, baseY + 29);
        }

        // Draw Right Pointer
        if (leftIdx <= rightIdx) {
          fill("#6a9bcc");
          noStroke();
          rect(rPx + w / 2 - 15, baseY + 45, 30, 18, 4);
          fill(255);
          textSize(10);
          textAlign(CENTER, CENTER);
          text(`${LANG_VARS[currentLang].r}↑`, rPx + w / 2, baseY + 54);
        }

        // Logic trigger
        if (!isDone && !isPaused) {
          p5Timer += 0.015 * params.speed;
          if (p5Timer > 1) {
            p5Timer = 0;
            performStep();
          }
        }
      }

      function performStep() {
        if (leftIdx > rightIdx) {
          isDone = true;
          logMsg(
            `🏁 <b>遍历结束！</b> 左右指针相遇。总共蓄水: <span style="color:var(--anthropic-blue);">${ansTotal}</span> 单元。`,
            true,
          );
          updateDataUI();
          return;
        }

        if (currentPhase === "COMPARE") {
          if (heightArr[leftIdx] < heightArr[rightIdx]) {
            activeSide = "left";
            logMsg(
              `⚖️ 比较: height[${leftIdx}](${heightArr[leftIdx]}) < height[${rightIdx}](${heightArr[rightIdx]})。处理<b>左侧</b>。`,
            );
          } else {
            activeSide = "right";
            logMsg(
              `⚖️ 比较: height[${leftIdx}](${heightArr[leftIdx]}) >= height[${rightIdx}](${heightArr[rightIdx]})。处理<b>右侧</b>。`,
            );
          }
          currentPhase = "PROCESS";
        } else if (currentPhase === "PROCESS") {
          if (activeSide === "left") {
            if (heightArr[leftIdx] >= leftMaxVal) {
              leftMaxVal = heightArr[leftIdx];
              logMsg(
                `&nbsp;&nbsp;⚠️ 高度 ${heightArr[leftIdx]} 大于等于左侧历史最高。更新 ${LANG_VARS[currentLang].lm} = ${leftMaxVal}。此处无法积水。`,
                true,
              );
            } else {
              let w = leftMaxVal - heightArr[leftIdx];
              ansTotal += w;
              waterArr[leftIdx] = w;
              document.getElementById("ans-display").innerText = ansTotal;
              logMsg(
                `&nbsp;&nbsp;💧 左侧短板为 ${leftMaxVal}，当前高度 ${heightArr[leftIdx]}。形成低洼，蓄水 ${w} 单元。`,
                false,
              );
              // Make log blue if it's right side, just visual distinction
              let logItems = document.querySelectorAll(".log-item");
              logItems[logItems.length - 1].classList.add("highlight-blue");
            }
          } else {
            if (heightArr[rightIdx] >= rightMaxVal) {
              rightMaxVal = heightArr[rightIdx];
              logMsg(
                `&nbsp;&nbsp;⚠️ 高度 ${heightArr[rightIdx]} 大于等于右侧历史最高。更新 ${LANG_VARS[currentLang].rm} = ${rightMaxVal}。此处无法积水。`,
                true,
              );
            } else {
              let w = rightMaxVal - heightArr[rightIdx];
              ansTotal += w;
              waterArr[rightIdx] = w;
              document.getElementById("ans-display").innerText = ansTotal;
              logMsg(
                `&nbsp;&nbsp;💧 右侧短板为 ${rightMaxVal}，当前高度 ${heightArr[rightIdx]}。形成低洼，蓄水 ${w} 单元。`,
                false,
              );
              let logItems = document.querySelectorAll(".log-item");
              logItems[logItems.length - 1].classList.add("highlight-blue");
            }
          }
          currentPhase = "MOVE";
        } else if (currentPhase === "MOVE") {
          if (activeSide === "left") {
            logMsg(`&nbsp;&nbsp;➡️ 移动左指针：${LANG_VARS[currentLang].l}++`);
            leftIdx++;
          } else {
            logMsg(`&nbsp;&nbsp;⬅️ 移动右指针：${LANG_VARS[currentLang].r}--`);
            rightIdx--;
          }
          currentPhase = "COMPARE";
        }
        updateDataUI();
      }

      function updateDataUI() {
        let container = document.getElementById("data-nodes");
        if (!container) return;
        container.innerHTML = "";
        heightArr.forEach((v, i) => {
          let node = document.createElement("div");
          node.className = "data-node";
          if (!isDone) {
            if (i === leftIdx) node.classList.add("active-left");
            if (i === rightIdx) node.classList.add("active-right");
          }
          node.innerText = v;
          container.appendChild(node);
        });
      }

      function logMsg(msg, highlight = false) {
        let container = document.getElementById("log-container");
        if (!container) return;
        let item = document.createElement("div");
        item.className = "log-item" + (highlight ? " highlight" : "");
        let time = new Date().toLocaleTimeString("zh-CN", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
        item.innerHTML = `<div class="time">${time}</div>${msg}`;
        container.appendChild(item);
        container.scrollTop = container.scrollHeight;
      }

      function switchLang(lang) {
        currentLang = lang;
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        const tabs = document.querySelectorAll(".tab");
        const langMap = { ts: 0, python: 1, java: 2, cpp: 3, c: 4 };
        tabs[langMap[lang]].classList.add("active");

        const codeEl = document.getElementById("code-viewer");
        const hljsMap = {
          ts: "language-typescript",
          python: "language-python",
          java: "language-java",
          cpp: "language-cpp",
          c: "language-c",
        };
        codeEl.className = "hljs " + hljsMap[lang];
        codeEl.textContent = SNIPPETS[lang];

        codeEl.removeAttribute("data-highlighted");
        if (window.hljs) hljs.highlightElement(codeEl);

        if (typeof initializeSystem === "function") {
          initializeSystem();
        }
      }

      function updateParam(id, val) {
        if (id in params) params[id] = parseFloat(val);
        let display = document.getElementById(id + "-value");
        if (display) display.textContent = val;
        if (id !== "speed") initializeSystem();
      }

      function updateSeed() {
        params.seed =
          parseInt(document.getElementById("seed-input").value) || 888;
        initializeSystem();
      }

      function randomSeedAndUpdate() {
        params.seed = floor(random(1, 99999));
        document.getElementById("seed-input").value = params.seed;
        initializeSystem();
      }

      function togglePause() {
        isPaused = !isPaused;
        let btn = document.getElementById("pause-btn");
        if (!btn) return;
        if (isPaused) {
          btn.innerHTML = "▶ 继续";
          btn.style.background = "var(--anthropic-green)";
        } else {
          btn.innerHTML = "⏸ 暂停";
          btn.style.background = "var(--anthropic-dark)";
        }
      }

      function resetAnimation() {
        initializeSystem();
      }
    </script>
  </body>
</html>
